name: 暴力战法每日信号监控

on:
  schedule:
    # 每周一至五 20:00 北京时间运行（UTC时间12:00）
    # baostock日K线数据在17:30完成入库，20:00运行可确保数据完整
    - cron: '0 12 * * 1-5'
  workflow_dispatch:  # 支持手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy baostock requests matplotlib mplfinance akshare scipy

    - name: 运行每日监控
      env:
        SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
      run: |
        python main.py --monitor --push

    - name: 上传信号文件
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: signals
        path: output/reports/signals_*.json
        retention-days: 30

    - name: 上传涨停池文件
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: limit_up_pool
        path: output/data/limit_up_history.csv
        retention-days: 30