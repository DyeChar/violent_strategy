name: 暴力战法每日信号监控

on:
  schedule:
    # 每周一至五 15:30 运行（UTC时间7:30，北京时间+8）
    - cron: '30 7 * * 1-5'
  workflow_dispatch:  # 支持手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy baostock requests matplotlib efinance akshare

    - name: 运行信号监控
      env:
        SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
      run: |
        python monitor_daily.py --push

    - name: 上传信号文件
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: signals
        path: output/signals_*.json
        retention-days: 30